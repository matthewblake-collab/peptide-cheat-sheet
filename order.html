<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peptide / Order</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#21262d;--text:#e6edf3;--muted:#8b949e;--dim:#484f58;--heading:#f0f6ff;--hk:#58a6ff;--lele:#3fb950;--lee:#f0883e;--acdc:#a371f7;--accent:#e3b341}
[data-theme=light]{--bg:#f6f8fa;--surface:#ffffff;--border:#d0d7de;--text:#1f2328;--muted:#636c76;--dim:#9198a1;--heading:#1f2328}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;padding-bottom:260px;transition:background .2s,color .2s}

/* LOCK */
#lock{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.lock-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;width:280px;text-align:center;display:flex;flex-direction:column;gap:14px}
.lock-card h2{color:var(--accent);font-size:16px;letter-spacing:3px}
.lock-card p{color:var(--muted);font-size:11px}
#pwIn{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:6px;text-align:center;font-size:16px;letter-spacing:6px;font-family:monospace;width:100%}
#pwIn:focus{outline:none;border-color:var(--accent)}
#pwIn.shake{animation:shk .3s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
#pwErr{color:#f85149;font-size:11px;min-height:14px}
.lock-btn{background:var(--accent);color:#000;border:none;padding:10px;border-radius:6px;font-weight:700;cursor:pointer;font-family:monospace;letter-spacing:1px}

/* HEADER */
#app{display:none}
.hdr{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
.brand{font-size:16px;font-weight:700;color:var(--accent);letter-spacing:2px;white-space:nowrap}
.brand span{color:var(--muted)}
.rate-box{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--muted)}
.rate-box input{background:transparent;border:none;color:var(--accent);width:44px;font-family:monospace;font-size:11px;text-align:center}
.rate-box input:focus{outline:none}
.sup-pills{display:flex;gap:6px;flex-wrap:wrap}
.sup-pill{display:flex;align-items:center;gap:4px;font-size:10px;letter-spacing:1px;font-weight:700;color:var(--muted);padding:3px 8px;border-radius:10px;border:1px solid var(--border);background:var(--surface)}
.sup-pill.active-hk{color:var(--hk);border-color:var(--hk);background:rgba(88,166,255,.08)}
.sup-pill.active-lele{color:var(--lele);border-color:var(--lele);background:rgba(63,185,80,.08)}
.sup-pill.active-lee{color:var(--lee);border-color:var(--lee);background:rgba(240,136,62,.08)}
.sup-pill.active-acdc{color:var(--acdc);border-color:var(--acdc);background:rgba(163,113,247,.08)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.selected-count{font-size:11px;color:var(--muted)}
.theme-btn{background:none;border:none;cursor:pointer;font-size:18px;line-height:1}

/* FILTERS */
.filters{padding:8px 18px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.filters input,.filters select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:12px;font-family:monospace}
.filters input{width:200px}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{background:var(--surface);color:var(--muted);font-weight:600;padding:7px 10px;text-align:left;position:sticky;top:0;z-index:5;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
tbody tr:nth-child(even){background:var(--bg)}
tbody tr:nth-child(odd){background:var(--surface)}
tbody tr:hover{background:rgba(88,166,255,.05)!important}
td{padding:6px 10px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
.sec-hdr td{background:#21262d!important;color:#f0f6fc;font-weight:700;font-size:10px;padding:5px 10px;letter-spacing:.5px}
[data-theme=light] .sec-hdr td{background:#eaeef2!important;color:#1f2328}
.pname{font-weight:700;color:var(--heading)}
.spec{color:var(--muted);font-size:11px}
.p-hk{color:var(--hk);font-weight:700}
.p-lele{color:var(--lele);font-weight:700}
.p-lee{color:var(--lee);font-weight:700}
.p-acdc{color:var(--acdc);font-weight:700}
.na{color:var(--dim)}
.badge{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700;letter-spacing:.5px}
.b-hk{background:rgba(88,166,255,.15);color:var(--hk)}
.b-lele{background:rgba(63,185,80,.15);color:var(--lele)}
.b-lee{background:rgba(240,136,62,.15);color:var(--lee)}
.b-acdc{background:rgba(163,113,247,.15);color:var(--acdc)}
.b-tie{background:rgba(255,255,255,.08);color:var(--muted)}
.w-hk{background:rgba(88,166,255,.04)!important}
.w-lele{background:rgba(63,185,80,.04)!important}
.w-lee{background:rgba(240,136,62,.04)!important}
.w-acdc{background:rgba(163,113,247,.04)!important}

/* QTY + SUPPLIER */
.qty-cell{display:flex;align-items:center;gap:5px}
.qty-in{width:52px;background:var(--bg);border:1px solid var(--border);color:var(--text);text-align:center;padding:4px;border-radius:5px;font-size:12px;font-family:monospace}
.qty-in:focus{border-color:var(--accent);outline:none}
.qty-in.has{border-color:#388bfd;background:rgba(31,111,235,.12);color:#fff}
.sup-sel{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:5px;font-size:11px;font-family:monospace;cursor:pointer}
.sup-sel:focus{outline:none;border-color:var(--accent)}

/* BOTTOM PO */
#poBar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:2px solid var(--border);z-index:50;display:none}
#poBar.show{display:block}
.po-toggle{display:flex;align-items:center;gap:8px;padding:8px 18px;cursor:pointer;border-bottom:1px solid var(--border);user-select:none}
.po-toggle-label{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent)}
.po-toggle-arrow{font-size:12px;color:var(--muted);transition:transform .2s}
.po-toggle-arrow.open{transform:rotate(180deg)}
#poContent{display:none;padding:12px 18px 0}
#poContent.open{display:block}
.po-panels{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px}
.po-panel{flex:0 0 260px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;min-height:80px}
.po-panel-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.po-panel-name{font-size:11px;font-weight:700;letter-spacing:1px}
.po-panel-total{font-size:14px;font-weight:700}
.po-item{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px}
.po-item:last-child{border-bottom:none}
.po-item-name{color:var(--text)}
.po-item-name .spec{display:inline;color:var(--muted)}
.po-item-price{color:var(--muted);text-align:right}
.po-no-items{color:var(--dim);font-size:11px;text-align:center;padding:12px 0}
.po-summary{display:flex;align-items:center;gap:20px;padding:10px 0 12px;border-top:1px solid var(--border);margin-top:4px;flex-wrap:wrap}
.po-summary-item{display:flex;flex-direction:column;gap:2px}
.po-summary-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.po-summary-val{font-size:16px;font-weight:700;color:var(--heading);font-family:monospace}
.po-summary-sub{font-size:10px;color:var(--muted)}
.print-btn{margin-left:auto;background:var(--accent);color:#000;border:none;padding:10px 20px;border-radius:6px;font-weight:700;cursor:pointer;font-family:monospace;font-size:12px;letter-spacing:1px;white-space:nowrap}
.print-btn:hover{opacity:.85}
.copy-btn{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:10px 16px;border-radius:6px;font-weight:700;cursor:pointer;font-family:monospace;font-size:12px;letter-spacing:1px;margin-left:8px}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}

@media print{
  #lock,#poBar .po-toggle,.filters,.hdr-right,.theme-btn{display:none!important}
  #poBar{position:static;border:none}
  #poContent{display:block!important}
  body{padding-bottom:0}
}
@media(max-width:600px){.po-panel{flex:0 0 220px}.hdr{padding:8px 12px}.brand{font-size:13px}}
</style>
</head>

</div>

<!-- APP -->

    <div class="hdr-right">

  </div>

  <div class="filters">
    <input type="text" id="search" placeholder="Search..." oninput="filterTable()">
    <select id="filterCat" onchange="filterTable()"><option value="">All categories</option></select>
    <select id="filterWinner" onchange="filterTable()">
      <option value="">All suppliers</option>
      <option value="hk">HKRoids cheapest</option>
      <option value="lele">LELE cheapest</option>
      <option value="lee">Lee cheapest</option>
      <option value="acdc">ACDC cheapest</option>
    </select>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>Product</th><th>Spec</th>
          <th style="color:var(--hk)">HKRoids</th>
          <th style="color:var(--lele)">LELE</th>
          <th style="color:var(--lee)">Lee</th>
          <th style="color:var(--acdc)">ACDC</th>
          <th>Best</th>
          <th style="min-width:140px">Qty / Supplier</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- BOTTOM PO -->
<div id="poBar">
  <div class="po-toggle" onclick="togglePO()">
    <span class="po-toggle-label">► PURCHASE ORDER</span>
    <span class="po-toggle-arrow" id="poArrow">▲</span>
  </div>
  <div id="poContent">
    <div class="po-panels" id="poPanels"></div>
    <div class="po-summary">
      <div class="po-summary-item">
        <span class="po-summary-label">Total USD</span>
        <span class="po-summary-val" id="totUSD">$0.00</span>
      </div>
      <div class="po-summary-item">
        <span class="po-summary-label">Total AUD</span>
        <span class="po-summary-val" id="totAUD">A$0.00</span>
        <span class="po-summary-sub" id="rateLabel">@ 1 USD = 1.55 AUD</span>
      </div>
      <div class="po-summary-item">
        <span class="po-summary-label">Line Items</span>
        <span class="po-summary-val" id="lineCount">0</span>
      </div>
      <button class="copy-btn" onclick="copyPO()">📋 COPY</button>
      <button class="print-btn" onclick="window.print()">🖨 PRINT ORDER</button>
    </div>
  </div>
</div>

  if(document.getElementById('pwIn').value==='12345'){

rows.forEach((r,i)=>r.id=i);

const order={}; // id -> {qty, sup}

function cheapestKey(r){
  const v=SUPS.map(s=>r[s.key]!=null?{v:r[s.key],k:s.key}:null).filter(Boolean);
  if(!v.length)return null;
  const mn=Math.min(...v.map(x=>x.v));
  const w=v.filter(x=>x.v===mn);
  return w.length===1?w[0].k:'tie';
}

function badgeHtml(w){
  if(!w||w==='tie')return`<span class="badge b-tie">TIE</span>`;
  const s=SUPS.find(x=>x.key===w);
  return`<span class="badge b-${w}">${s.label}</span>`;
}

function priceCell(r,key){
  return r[key]!=null?`<span class="p-${key}">$${r[key]}</span>`:`<span class="na">—</span>`;
}

function renderTable(data){
  const tbody=document.getElementById('tbody');
  let html='',lastCat='';
  for(const r of data){
    if(r.cat!==lastCat){html+=`<tr class="sec-hdr"><td colspan="8">${r.cat}</td></tr>`;lastCat=r.cat;}
    const w=cheapestKey(r);
    const rc=w&&w!=='tie'?`w-${w}`:'';
    const cur=order[r.id]||{qty:0,sup:w||'lele'};
    const qv=cur.qty||'';
    const supOpts=SUPS.map(s=>{
      const dis=r[s.key]==null;
      const sel=cur.sup===s.key?'selected':'';
      return`<option value="${s.key}" ${dis?'disabled':''} ${sel}>${s.label}${r[s.key]!=null?' $'+r[s.key]:'  N/A'}</option>`;
    }).join('');
    html+=`<tr class="${rc}">
      <td><span class="pname">${r.p}</span></td>
      <td><span class="spec">${r.s}</span></td>
      <td>${priceCell(r,'hk')}</td>
      <td>${priceCell(r,'lele')}</td>
      <td>${priceCell(r,'lee')}</td>
      <td>${priceCell(r,'acdc')}</td>
      <td>${badgeHtml(w)}</td>
      <td><div class="qty-cell">
        <input class="qty-in ${qv>0?'has':''}" type="number" min="0" max="999" value="${qv||''}" placeholder="0" oninput="setQty(${r.id},this.value,this)">
        <select class="sup-sel" onchange="setSup(${r.id},this.value)">${supOpts}</select>
      </div></td>
    </tr>`;
  }
  tbody.innerHTML=html;
}

function setQty(id,val,el){
  const n=parseInt(val)||0;
  const r=rows[id];
  if(n<=0){delete order[id];el.classList.remove('has');}
  else{
    const cur=order[id]||{};
    const sup=cur.sup||(cheapestKey(r)||SUPS.find(s=>r[s.key]!=null)?.key||'lele');
    order[id]={qty:n,sup};
    el.classList.add('has');
  }
  updatePO();
}

function setSup(id,sup){
  if(order[id])order[id].sup=sup;
  else{const r=rows[id];if(r[sup]!=null)order[id]={qty:0,sup};}
  updatePO();
}

// ── PO UPDATE ──
let poOpen=false;
function togglePO(){
  poOpen=!poOpen;
  document.getElementById('poContent').className=poOpen?'open':'';
  document.getElementById('poArrow').className=poOpen?'po-toggle-arrow open':'po-toggle-arrow';
}

function updatePO(){
  const ids=Object.keys(order).map(Number).filter(id=>order[id]?.qty>0);
  const bar=document.getElementById('poBar');
  if(!ids.length){bar.className='';document.getElementById('selCount').textContent='';updatePills({});return;}
  bar.className='show';

  // group by supplier
  const grouped={};
  SUPS.forEach(s=>grouped[s.key]=[]);
  let totalUSD=0;
  for(const id of ids){
    const r=rows[id];const{qty,sup}=order[id];
    const price=r[sup];
    if(price==null)continue;
    grouped[sup].push({r,qty,price,line:price*qty});
    totalUSD+=price*qty;
  }

  // panels
  let panelsHtml='';
  const activeSups={};
  for(const s of SUPS){
    const items=grouped[s.key];
    if(items.length>0)activeSups[s.key]=true;
    let itemsHtml=items.length?items.map(({r,qty,line})=>`
      <div class="po-item">
        <span class="po-item-name">${r.p} <span class="spec">${r.s}</span></span>
        <span class="po-item-price">×${qty} $${line.toLocaleString()}</span>
      </div>`).join(''):`<div class="po-no-items">No items</div>`;
    const supTotal=items.reduce((a,x)=>a+x.line,0);
    panelsHtml+=`<div class="po-panel">
      <div class="po-panel-hdr">
        <span class="po-panel-name" style="color:${s.color}">${s.label}</span>
        <span class="po-panel-total" style="color:${s.color}">$${supTotal.toLocaleString()} USD</span>
      </div>
      ${itemsHtml}
    </div>`;
  }
  document.getElementById('poPanels').innerHTML=panelsHtml;

  // totals
  const rate=parseFloat(document.getElementById('rateIn').value)||1.55;
  const aud=totalUSD*rate;
  document.getElementById('totUSD').textContent=`$${totalUSD.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})} USD`;
  document.getElementById('totAUD').textContent=`A$${aud.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  document.getElementById('rateLabel').textContent=`@ 1 USD = ${rate.toFixed(2)} AUD`;
  document.getElementById('lineCount').textContent=ids.length;
  document.getElementById('selCount').textContent=`${ids.length} selected`;
  updatePills(activeSups);
  if(!poOpen)togglePO();
}

function updatePills(active){
  const container=document.getElementById('supPills');
  container.innerHTML=SUPS.map(s=>`<span class="sup-pill ${active[s.key]?`active-${s.key}`:''}">● ${s.label}</span>`).join('');
}

function copyPO(){
  const ids=Object.keys(order).map(Number).filter(id=>order[id]?.qty>0);
  const grouped={};
  SUPS.forEach(s=>grouped[s.key]=[]);
  let totalUSD=0;
  for(const id of ids){
    const r=rows[id];const{qty,sup}=order[id];
    const price=r[sup];if(price==null)continue;
    grouped[sup].push({r,qty,price,line:price*qty});
    totalUSD+=price*qty;
  }
  const rate=parseFloat(document.getElementById('rateIn').value)||1.55;
  const date=new Date().toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'});
  let txt=`PEPTIDE PURCHASE ORDER — ${date}\n${'═'.repeat(55)}\n`;
  for(const s of SUPS){
    const items=grouped[s.key];
    if(!items.length)continue;
    txt+=`\n${s.label}\n${s.contact}\n${'─'.repeat(50)}\n`;
    items.forEach(({r,qty,price,line})=>{
      txt+=`${r.p} ${r.s}`.padEnd(38)+`×${qty}`.padStart(4)+` $${line.toLocaleString()}`.padStart(10)+'\n';
    });
    const st=items.reduce((a,x)=>a+x.line,0);
    txt+=`${'Subtotal'.padEnd(42)}$${st.toLocaleString().padStart(10)}\n`;
  }
  txt+=`\n${'═'.repeat(55)}\n`;
  txt+=`${'ORDER TOTAL USD'.padEnd(42)}$${totalUSD.toLocaleString(undefined,{maximumFractionDigits:2}).padStart(10)}\n`;
  txt+=`${'ORDER TOTAL AUD'.padEnd(42)}A$${(totalUSD*rate).toLocaleString(undefined,{maximumFractionDigits:2}).padStart(9)}\n`;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=document.querySelector('.copy-btn');
    btn.textContent='✅ COPIED';
    setTimeout(()=>btn.textContent='📋 COPY',2000);
  });
}

// ── FILTER ──
function populateCats(){
  const cats=[...new Set(rows.map(r=>r.cat))];
  const sel=document.getElementById('filterCat');
  cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
}

function filterTable(){
  const q=document.getElementById('search').value.toLowerCase();
  const fc=document.getElementById('filterCat').value;
  const fw=document.getElementById('filterWinner').value;
  renderTable(rows.filter(r=>{
    const mQ=!q||r.p.toLowerCase().includes(q)||r.cat.toLowerCase().includes(q)||r.s.toLowerCase().includes(q);
    const mC=!fc||r.cat===fc;
    const w=cheapestKey(r);
    const mW=!fw||w===fw;
    return mQ&&mC&&mW;
  }));
}

function init(){populateCats();renderTable(rows);updatePills({});}
if(sessionStorage.getItem('po_ok')==='1')init();
