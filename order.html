<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nico / Order</title>
<style>
:root{--bg:#0d1117;--sur:#161b22;--bor:#21262d;--txt:#e6edf3;--mut:#8b949e;--dim:#484f58;--hd:#f0f6ff;--ac:#a371f7;--gold:#e3b341}
[data-theme=light]{--bg:#f6f8fa;--sur:#fff;--bor:#d0d7de;--txt:#1f2328;--mut:#636c76;--dim:#9198a1;--hd:#1f2328}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;background:var(--bg);color:var(--txt);font-size:13px;min-height:100vh;padding-bottom:280px}
#lock{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.lc{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:32px;width:280px;text-align:center;display:flex;flex-direction:column;gap:14px}
.lc h2{color:var(--gold);font-size:16px;letter-spacing:3px}
.lc p{color:var(--mut);font-size:11px}
#pwIn{background:var(--bg);border:1px solid var(--bor);color:var(--txt);padding:10px;border-radius:6px;text-align:center;font-size:18px;letter-spacing:8px;font-family:monospace;width:100%}
#pwIn:focus{outline:none;border-color:var(--gold)}
#pwIn.shake{animation:shk .3s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
#pwErr{color:#f85149;font-size:11px;min-height:14px}
.lbtn{background:var(--gold);color:#000;border:none;padding:10px;border-radius:6px;font-weight:700;cursor:pointer;font-family:monospace;letter-spacing:1px}
#app{display:none}
.hdr{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--bor);flex-wrap:wrap}
.brand{font-size:16px;font-weight:700;color:var(--gold);letter-spacing:2px;white-space:nowrap}
.brand span{color:var(--mut)}
.rb{display:flex;align-items:center;gap:5px;background:var(--sur);border:1px solid var(--bor);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--mut)}
.rb input{background:transparent;border:none;color:var(--gold);width:44px;font-family:monospace;font-size:11px;text-align:center}
.rb input:focus{outline:none}
.nico-pill{font-size:11px;font-weight:700;padding:3px 12px;border-radius:10px;border:1px solid var(--ac);background:rgba(163,113,247,.12);color:var(--ac);letter-spacing:1px}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.sc{font-size:11px;color:var(--mut)}
.tbtn{background:none;border:none;cursor:pointer;font-size:18px}
.filters{padding:8px 18px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--bor)}
.filters input,.filters select{background:var(--sur);border:1px solid var(--bor);color:var(--txt);padding:6px 10px;border-radius:6px;font-size:12px;font-family:monospace}
.filters input{width:200px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{background:var(--sur);color:var(--mut);font-weight:600;padding:7px 10px;text-align:left;position:sticky;top:0;z-index:5;border-bottom:1px solid var(--bor);font-size:10px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
tbody tr:nth-child(even){background:var(--bg)}
tbody tr:nth-child(odd){background:var(--sur)}
tbody tr:hover{background:rgba(163,113,247,.05)!important}
td{padding:7px 10px;border-bottom:1px solid var(--bor);vertical-align:middle;white-space:nowrap}
.sh td{background:#21262d!important;color:#f0f6fc;font-weight:700;font-size:10px;padding:5px 10px;letter-spacing:.5px}
[data-theme=light] .sh td{background:#eaeef2!important;color:#1f2328}
.pn{font-weight:700;color:var(--hd)}
.dose{color:var(--mut);font-size:11px}
.code{color:var(--ac);font-size:11px;font-family:monospace;letter-spacing:.5px}
.price{color:var(--ac);font-weight:700}
.qi{width:60px;background:var(--bg);border:1px solid var(--bor);color:var(--txt);text-align:center;padding:5px;border-radius:5px;font-size:13px;font-family:monospace}
.qi:focus{border-color:var(--gold);outline:none}
.qi.has{border-color:var(--gold);background:rgba(227,179,65,.12);color:#fff;font-weight:700}
#poBar{position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:2px solid var(--bor);z-index:50;display:none}
#poBar.show{display:block}
.pot{display:flex;align-items:center;gap:8px;padding:9px 18px;cursor:pointer;border-bottom:1px solid var(--bor);user-select:none}
.pol{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--gold)}
.poa{color:var(--mut);transition:transform .2s;font-size:11px}
.poa.up{transform:rotate(180deg)}
#pob{display:none;padding:14px 18px 0}
#pob.open{display:block}
.po-list{margin-bottom:12px;border:1px solid var(--bor);border-radius:8px;overflow:hidden}
.po-list-hdr{background:rgba(163,113,247,.08);border-bottom:1px solid var(--bor);padding:8px 14px;display:flex;justify-content:space-between;align-items:center}
.po-list-title{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--ac)}
.po-list-total{font-size:15px;font-weight:700;color:var(--ac);font-family:monospace}
.po-row{display:grid;grid-template-columns:70px 1fr auto auto;gap:10px;align-items:center;padding:6px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.po-row:last-child{border-bottom:none}
.po-code{color:var(--ac);font-family:monospace;font-size:11px;font-weight:700}
.po-name{color:var(--txt)}
.po-name .d{color:var(--mut);font-size:10px}
.po-qty{color:var(--mut);text-align:right;white-space:nowrap}
.po-line{font-weight:700;text-align:right;white-space:nowrap}
.po-extras{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.po-extra{display:flex;align-items:center;gap:6px;background:var(--sur);border:1px solid var(--bor);border-radius:6px;padding:6px 12px;font-size:11px;color:var(--mut)}
.po-extra label{white-space:nowrap}
.po-extra input{background:var(--bg);border:1px solid var(--bor);color:var(--txt);padding:4px 7px;border-radius:5px;font-size:11px;font-family:monospace;width:70px;text-align:right}
.po-extra input:focus{outline:none;border-color:var(--gold)}
.ps{display:flex;align-items:center;gap:18px;padding:10px 0 12px;border-top:1px solid var(--bor);flex-wrap:wrap}
.psi{display:flex;flex-direction:column;gap:1px}
.psl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--mut)}
.psv{font-size:15px;font-weight:700;color:var(--hd);font-family:monospace}
.pss{font-size:10px;color:var(--mut)}
.cbtn{background:var(--sur);color:var(--txt);border:1px solid var(--bor);padding:9px 16px;border-radius:6px;font-weight:700;cursor:pointer;font-family:monospace;font-size:11px;letter-spacing:1px}
.cbtn:hover{border-color:var(--gold);color:var(--gold)}
.pbtn{margin-left:auto;background:var(--gold);color:#000;border:none;padding:10px 20px;border-radius:6px;font-weight:700;cursor:pointer;font-family:monospace;font-size:12px;letter-spacing:1px}
.pbtn:hover{opacity:.85}
@media print{#lock,.pot,.filters,.hdr-r,.tbtn,.po-extras{display:none!important}#poBar{position:static;border:none}#pob{display:block!important}body{padding-bottom:0}}
@media(max-width:600px){.hdr{padding:8px 12px}.po-row{grid-template-columns:55px 1fr auto auto;gap:6px}}
</style>
</head>
<body>
<div id="lock">
  <div class="lc">
    <div style="font-size:36px">🧬</div>
    <h2>NICO / ORDER</h2>
    <p>Enter access code</p>
    <input id="pwIn" type="password" placeholder="••••" maxlength="20" onkeydown="if(event.key==='Enter')unlock()">
    <div id="pwErr"></div>
    <button class="lbtn" onclick="unlock()">UNLOCK</button>
  </div>
</div>
<div id="app">
  <div class="hdr">
    <div class="brand">NICO<span> / </span>ORDER</div>
    <span class="nico-pill">● ACDC / NICO</span>
    <div class="rb">1 USD = <input id="rateIn" type="number" value="1.55" step="0.01" min="0.01" oninput="renderPO()"> AUD</div>
    <div class="hdr-r">
      <span class="sc" id="selCount"></span>
      <button class="tbtn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>
  </div>
  <div class="filters">
    <input type="text" id="search" placeholder="Search product or code..." oninput="ft()">
    <select id="filterCat" onchange="ft()"><option value="">All categories</option></select>
  </div>
  <div class="tw">
    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>Dose</th>
          <th>Code</th>
          <th style="color:var(--ac)">Price (USD)</th>
          <th>Qty</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
<div id="poBar">
  <div class="pot" onclick="togglePO()">
    <span class="pol">► PURCHASE ORDER — ACDC / NICO</span>
    <span class="poa" id="poArrow">▲</span>
  </div>
  <div id="pob">
    <div class="po-list">
      <div class="po-list-hdr">
        <span class="po-list-title">ACDC / NICO · WhatsApp +852 6324 8271</span>
        <span class="po-list-total" id="poSubtotal">$0 USD</span>
      </div>
      <div id="poItems"></div>
    </div>
    <div class="po-extras">
      <div class="po-extra"><label>Discount %</label><input id="discIn" type="number" min="0" max="100" placeholder="0" oninput="renderPO()"> %</div>
      <div class="po-extra"><label>Shipping USD</label><input id="shipIn" type="number" min="0" placeholder="0" oninput="renderPO()"> $</div>
    </div>
    <div class="ps">
      <div class="psi"><span class="psl">Total USD</span><span class="psv" id="sumUSD">$0.00</span></div>
      <div class="psi"><span class="psl">Total AUD</span><span class="psv" id="sumAUD">A$0.00</span><span class="pss" id="rateLabel">@ 1 USD = 1.55 AUD</span></div>
      <div class="psi"><span class="psl">Line Items</span><span class="psv" id="sumLines">0</span></div>
      <button class="cbtn" onclick="copyPO()" id="copyBtn">📋 COPY FOR WHATSAPP</button>
      <button class="pbtn" onclick="window.print()">🖨 PRINT ORDER</button>
    </div>
  </div>
</div>

ROWS.forEach((r,i)=>r.id=i);
const basket={};
let poOpen=false;
function renderTable(data){
  const tbody=document.getElementById('tbody');
  let html='',lastCat='';
  for(const r of data){
    if(r.ac==null)continue;
    if(r.cat!==lastCat){html+=`<tr class="sh"><td colspan="5">${r.cat}</td></tr>`;lastCat=r.cat;}
    const qty=basket[r.id]||'';
    html+=`<tr><td><span class="pn">${r.p}</span></td><td><span class="dose">${r.s}</span></td><td><span class="code">${r.code}</span></td><td><span class="price">$${r.ac}</span></td><td><input class="qi${qty>0?' has':''}" type="number" min="0" max="999" value="${qty||''}" placeholder="0" data-id="${r.id}" oninput="handleQty(this)"></td></tr>`;
  }
  tbody.innerHTML=html;
}
function handleQty(el){
  const id=parseInt(el.dataset.id);
  const n=parseInt(el.value)||0;
  if(n<=0){delete basket[id];el.classList.remove('has');}
  else{basket[id]=n;el.classList.add('has');}
  renderPO();
}
function ft(){
  const q=document.getElementById('search').value.toLowerCase();
  const fc=document.getElementById('filterCat').value;
  renderTable(ROWS.filter(r=>{
    const mQ=!q||r.p.toLowerCase().includes(q)||r.s.toLowerCase().includes(q)||r.code.toLowerCase().includes(q)||r.cat.toLowerCase().includes(q);
    return mQ&&(!fc||r.cat===fc);
  }));
}
function togglePO(){
  poOpen=!poOpen;
  document.getElementById('pob').className=poOpen?'open':'';
  document.getElementById('poArrow').className=poOpen?'poa up':'poa';
}
function renderPO(){
  const ids=Object.keys(basket).map(Number).filter(id=>basket[id]>0);
  document.getElementById('selCount').textContent=ids.length?`${ids.length} selected`:'';
  const bar=document.getElementById('poBar');
  if(!ids.length){bar.className='';return;}
  bar.className='show';
  const items=ids.map(id=>({r:ROWS[id],qty:basket[id]}));
  let sub=0;
  let html='';
  items.forEach(({r,qty})=>{
    const line=r.ac*qty;sub+=line;
    html+=`<div class="po-row"><span class="po-code">${r.code}</span><span class="po-name">${r.p} <span class="d">${r.s}</span></span><span class="po-qty">x${qty}</span><span class="po-line">$${line.toLocaleString()}</span></div>`;
  });
  document.getElementById('poItems').innerHTML=html;
  document.getElementById('poSubtotal').textContent=`$${sub.toLocaleString()} USD`;
  const disc=parseFloat(document.getElementById('discIn').value)||0;
  const ship=parseFloat(document.getElementById('shipIn').value)||0;
  const discAmt=sub*(disc/100);
  const total=sub-discAmt+ship;
  const rate=parseFloat(document.getElementById('rateIn').value)||1.55;
  document.getElementById('sumUSD').textContent=`$${total.toFixed(2)} USD`;
  document.getElementById('sumAUD').textContent=`A$${(total*rate).toFixed(2)}`;
  document.getElementById('rateLabel').textContent=`@ 1 USD = ${rate.toFixed(2)} AUD`;
  document.getElementById('sumLines').textContent=ids.length;
  if(!poOpen)togglePO();
}
function copyPO(){
  const ids=Object.keys(basket).map(Number).filter(id=>basket[id]>0);
  if(!ids.length)return;
  const items=ids.map(id=>({r:ROWS[id],qty:basket[id]}));
  const disc=parseFloat(document.getElementById('discIn').value)||0;
  const ship=parseFloat(document.getElementById('shipIn').value)||0;
  const rate=parseFloat(document.getElementById('rateIn').value)||1.55;
  const date=new Date().toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'});
  let sub=0;
  let lines='';
  items.forEach(({r,qty})=>{
    const line=r.ac*qty;sub+=line;
    const label=`${r.code}  ${r.p} ${r.s}`;
    lines+=`${label.padEnd(38)}x${qty}   $${String(line).padStart(6)}\n`;
  });
  const discAmt=sub*(disc/100);
  const total=sub-discAmt+ship;
  let txt=`ORDER — ACDC / NICO\nWhatsApp +852 6324 8271\nacdcsource.com\n${date}\n${'─'.repeat(50)}\n${lines}${'─'.repeat(50)}\nSubtotal:          $${sub.toFixed(2)}\n`;
  if(disc>0)txt+=`Discount (${disc}%):  -$${discAmt.toFixed(2)}\n`;
  if(ship>0)txt+=`Shipping:          +$${ship.toFixed(2)}\n`;
  txt+=`TOTAL USD:          $${total.toFixed(2)}\nTOTAL AUD:         A$${(total*rate).toFixed(2)}\n`;
  navigator.clipboard.writeText(txt).then(()=>{const btn=document.getElementById('copyBtn');btn.textContent='✅ COPIED!';setTimeout(()=>{btn.textContent='📋 COPY FOR WHATSAPP';},2500);});
}
function populateCats(){
  const cats=[...new Set(ROWS.filter(r=>r.ac!=null).map(r=>r.cat))];
  const sel=document.getElementById('filterCat');
  cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
}
function init(){populateCats();renderTable(ROWS);}
if(sessionStorage.getItem('po_ok')==='1')init();
